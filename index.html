sso imediato. Pagamento único de R$47,90. Garantia de 30 dias.<\u002Fp>\n    <div style=\"display:flex;justify-content:center;margin-top:28px\">\n      <a href=\"https://pay.kiwify.com.br/yvOJ5dZ\" target=\"_blank\" rel=\"noopener\" style=\"width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:3px;background:#EE6C4D;color:#fff;text-decoration:none;padding:clamp(18px,4.8vw,22px) 26px;border-radius:18px;box-shadow:0 16px 44px rgba(238,108,77,.55);animation:czPulse 2.8s ease-in-out infinite\" style-hover=\"transform:translateY(-3px)\">\n        <span style=\"font-weight:800;font-size:clamp(17px,4.6vw,21px)\">Quero o Protocolo Choro Zero<\u002Fspan>\n        <span style=\"font-weight:600;font-size:13px;opacity:.92\">R$47,90 · acesso imediato<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FAQ ===================== -->\n<section data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .8s cubic-bezier(.22,.61,.36,1),transform .8s cubic-bezier(.22,.61,.36,1);padding:clamp(44px,9vw,80px) 20px\">\n  <div style=\"max-width:720px;margin:0 auto\">\n    <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(24px,5.6vw,40px);letter-spacing:-.02em;text-align:center;margin:0 0 30px\">Perguntas frequentes<\u002Fh2>\n    <div style=\"display:grid;gap:12px\">\n      <sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"5\">\n        <div style=\"background:#fff;border:1px solid rgba(34,27,51,.08);border-radius:16px;overflow:hidden;box-shadow:0 8px 20px rgba(34,27,51,.04)\">\n          <button onclick=\"{{ item.toggle }}\" style=\"width:100%;display:flex;justify-content:space-between;align-items:center;gap:14px;background:transparent;border:none;cursor:pointer;text-align:left;padding:18px 20px;font-family:'Hanken Grotesk',sans-serif;font-size:clamp(15px,4vw,17px);font-weight:700;color:#221B33\">\n            <span>{{ item.q }}<\u002Fspan>\n            <span style=\"{{ item.iconStyle }}\">+<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"{{ item.bodyStyle }}\">\n            <p style=\"margin:0;padding:0 20px 18px;font-size:15.5px;line-height:1.6;color:#4A4358\">{{ item.a }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FOOTER ===================== -->\n<footer style=\"background:#201A30;color:#B9B1C4;padding:clamp(30px,6vw,48px) 20px;text-align:center\">\n  <div style=\"max-width:640px;margin:0 auto\">\n    <p style=\"font-weight:800;color:#EFE8DC;font-size:16px;margin:0 0 8px\">Protocolo Choro Zero <span style=\"font-weight:500;color:#9E96AC\">· Guia digital · R$47,90<\u002Fspan><\u002Fp>\n    <p style=\"font-size:13px;line-height:1.6;margin:0 0 16px\">Este material tem caráter informativo e não substitui avaliação médica. Em sinais de alerta, procure o pediatra ou a UPA. Apoio emocional: CVV 188 (24h).<\u002Fp>\n    <a href=\"https://pay.kiwify.com.br/yvOJ5dZ\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;color:#EE9A83;font-weight:700;text-decoration:none;font-size:14px;border-bottom:1px solid rgba(238,154,131,.4);padding-bottom:2px\">Garantir meu acesso →<\u002Fa>\n    <p style=\"font-size:12px;color:#6E6780;margin:18px 0 0\">© 2026 Choro Zero<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ===================== STICKY MOBILE CTA ===================== -->\n<div ref=\"{{ barRef }}\" style=\"position:fixed;left:0;right:0;bottom:0;z-index:60;transform:translateY(140%);transition:transform .4s cubic-bezier(.22,.61,.36,1);padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(250,245,239,.92);backdrop-filter:blur(10px);border-top:1px solid rgba(34,27,51,.08);box-shadow:0 -8px 24px rgba(34,27,51,.08)\">\n  <a href=\"https://pay.kiwify.com.br/yvOJ5dZ\" target=\"_blank\" rel=\"noopener\" style=\"max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#EE6C4D;color:#fff;text-decoration:none;padding:14px 20px;border-radius:14px;box-shadow:0 10px 24px rgba(238,108,77,.4)\">\n    <span style=\"display:flex;flex-direction:column;line-height:1.15\"><b style=\"font-size:16px\">Quero o Protocolo<\u002Fb><span style=\"font-size:12px;opacity:.9\">R$47,90 · acesso imediato<\u002Fspan><\u002Fspan>\n    <span style=\"flex:none;font-weight:800;font-size:15px;background:rgba(255,255,255,.2);padding:8px 14px;border-radius:10px\">Comprar →<\u002Fspan>\n  <\u002Fa>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n  barRef = React.createRef();\n  savedRef = React.createRef();\n\n  componentDidMount() {\n    // Scroll reveal\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n    document.querySelectorAll('[data-reveal]').forEach((el) => io.observe(el));\n    // Failsafe reveal\n    this._revealTimer = setTimeout(() => {\n      document.querySelectorAll('[data-reveal]').forEach((el) => {\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n      });\n    }, 2800);\n\n    // Sticky CTA bar\n    const bar = this.barRef.current;\n    this._onScroll = () => {\n      if (!bar) return;\n      bar.style.transform = window.scrollY > 700 ? 'translateY(0)' : 'translateY(140%)';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n    // Count-up savings\n    const sv = this.savedRef.current;\n    if (sv) {\n      const io2 = new IntersectionObserver((es) => {\n        es.forEach((e) => {\n          if (e.isIntersecting) {\n            this.countUp(sv, 221, 1200);\n            io2.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.6 });\n      io2.observe(sv);\n    }\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._revealTimer);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  countUp(el, target, dur) {\n    const start = performance.now();\n    const tick = (t) => {\n      const p = Math.min(1, (t - start) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      el.textContent = Math.round(target * e);\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  renderVals() {\n    const open = this.state.openFaq;\n    const data = [\n      { q: 'Como eu recebo o material?', a: 'Assim que o pagamento é aprovado, você recebe o acesso por e-mail para baixar o PDF na hora. Fica salvo com você para sempre.' },\n      { q: 'E se não funcionar pra mim?', a: 'Você tem 30 dias de garantia incondicional. Se não for pra você, é só pedir o reembolso — devolvemos 100% do valor, sem perguntas.' },\n      { q: 'Como funciona o pagamento?', a: 'Pagamento único de R$47,90, sem mensalidade. Cartão, Pix ou boleto, em ambiente seguro da Kiwify.' },\n      { q: 'Isso substitui o pediatra?', a: 'Não. O Protocolo te ajuda a entender o choro do dia a dia e mostra exatamente os sinais de alerta em que você deve procurar o pediatra. Ele complementa o acompanhamento médico, não substitui.' },\n      { q: 'Serve para qual idade do bebê?', a: 'O conteúdo é focado nos primeiros meses (0 a 6 meses), quando o choro é a principal forma de comunicação do bebê.' },\n    ];\n    const faqs = data.map((f, i) => {\n      const isOpen = open === i;\n      return {\n        q: f.q,\n        a: f.a,\n        toggle: () => this.setState((s) => ({ openFaq: s.openFaq === i ? -1 : i })),\n        iconStyle: `flex:none;font-size:24px;font-weight:400;color:#EE6C4D;transition:transform .3s ease;transform:rotate(${isOpen ? 45 : 0}deg)`,\n        bodyStyle: `overflow:hidden;transition:max-height .4s ease,opacity .3s ease;max-height:${isOpen ? 320 : 0}px;opacity:${isOpen ? 1 : 0}`,\n      };\n    });\n    return { faqs, barRef: this.barRef, savedRef: this.savedRef };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
